<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/ab33a04510.js"
      crossorigin="anonymous"
    ></script>
    ">
  </head>
  <body>
    <div class="bg-glow" id="bgGlow"></div>

    <div class="player">
      <div class="nav">
        <div
          class="nav-btn"
          id="shuffleNavBtn"
          title="Shuffle"
          onclick="toggleShuffle()"
        >
          <i class="fa-solid fa-shuffle"></i>
        </div>
        <span class="nav-label">Now Playing</span>
        <div class="nav-btn" onclick="togglePlaylist()" title="Playlist">
          <i class="fa-solid fa-list"></i>
        </div>
      </div>

      <div class="art-wrap">
        <div class="art" id="albumArt"></div>
        <div class="art-center"></div>
      </div>

      <div class="song-info">
        <div class="song-title" id="songTitle">28</div>
        <div class="song-artist" id="songArtist">Ruth B ft. Dean Lewis</div>
      </div>

      <audio id="song"></audio>

      <div class="progress-wrap">
        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
        <input type="range" id="progress" value="0" min="0" step="0.1" />
      </div>

      <!-- Controls -->
      <div class="controls">
        <button
          class="ctrl-btn"
          id="repeatBtn"
          onclick="toggleRepeat()"
          title="Repeat"
        >
          <i class="fa-solid fa-repeat"></i>
        </button>
        <button class="ctrl-btn" onclick="prevSong()" title="Previous">
          <i class="fa-solid fa-backward-step"></i>
        </button>
        <button
          class="play-btn"
          id="playBtn"
          onclick="playPause()"
          title="Play / Pause"
        >
          <i class="fa-solid fa-play" id="ctrlIcon"></i>
        </button>
        <button class="ctrl-btn" onclick="nextSong()" title="Next">
          <i class="fa-solid fa-forward-step"></i>
        </button>
        <button
          class="ctrl-btn"
          id="likeBtn"
          onclick="toggleLike()"
          title="Like"
        >
          <i class="fa-regular fa-heart"></i>
        </button>
      </div>

      <div class="volume-wrap">
        <span class="vol-icon"
          ><i class="fa-solid fa-volume-low" id="volIcon"></i
        ></span>
        <input
          type="range"
          id="volume"
          min="0"
          max="1"
          step="0.01"
          value="0.8"
        />
        <span class="vol-icon"><i class="fa-solid fa-volume-high"></i></span>
      </div>

      <div class="playlist" id="playlist"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
